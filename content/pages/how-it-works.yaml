pageHeading: How It Works
pageIntro: Clear steps from onboarding to results.
steps:
  - heading: 1) Onboarding
    description: 1-on-1 video consultation to understand goals, constraints, and preferences.
  - heading: 2) 24/7 Support
    description: Direct messaging for accountability, questions, and quick adjustments.
  - heading: 3) Training Program
    description: >-
      Assessment-driven plan with proper progressions and video demonstrations.
  - heading: 4) iOS & Android App
    description: >-
      Programs delivered via the Beckford Fitness app (Trainerize) with progress
      tracking and chat.
  - heading: 5) Meal Plan
    description: >-
      Calories, macros, simple recipes, and shopping lists tailored to your
      lifestyle.
  - heading: 6) Beyond Fitness
    description: >-
      Mindfulness, yoga, reflection, and life coaching integrated for sustainable
      change.
