heroHeading: 1 on 1 Personal Training, Life Coaching and Nutrition Guidance
heroIntro: >-
  Transform your fitness journey with personalized 1-on-1 training, life
  coaching, and nutrition guidance. Sean Beckford brings 11 years of experience
  and 9 professional certifications to create custom programs that deliver real
  results.


  Train virtually from anywhere or in-person in Downtown Toronto. Access your
  programming, video demonstrations, and 24/7 support through the
  beckfordfitness app. Flexible packages from $299/month or individual sessions
  available.
heroBodyText: >-
  Our holistic approach combines functional movement, evidence-based nutrition,
  and recovery methods to help you achieve lasting transformation.
heroButton1: Schedule a Free Consultation
heroButton2: View Packages
howItWorksCards:
  - title: Onboarding
    description: >-
      Upon signup you will receive a personal, 1 on 1 video consultation to help
      me understand your goals, circumstances and preferences.
  - title: 24/7 Support
    description: >-
      When you begin your training program with me, you get unlimited instant
      messaging access to address any questions you may have and provide
      assistance.
  - title: Training Program
    description: >-
      I use the information provided to me during our assessment to build a
      training program to your needs and goals. This removes the guessing from
      your workout plans.
  - title: iOS & Android App
    description: >-
      All your programming is easily accessible via the beckfordfitness app on
      iOS & Android devices powered by Trainerize. You'll also be able to upload
      information and chat with me directly.
  - title: Meal Plan
    description: >-
      A complete guide to healthy eating, tailored for you. Caloric intake,
      macronutrient profiles, easy recipes and shopping lists.
  - title: Beyond Fitness
    description: >-
      I can help set you up for success through all aspects of a healthy
      lifestyle, including mindfulness, yoga, reflection and life coaching.
successStoriesHeading: Client Transformations
successStoriesSubtext: Real results from clients building strength, mobility, and confidence.
instagramHeading: Fitness & Lifestyle Content
instagramBody: >-
  Follow @beckford_sean for daily fitness tips, workout inspiration, and
  lifestyle content.
instagramHandle: beckford_sean
newsletterHeading: Sign up to Move with Sean!
newsletterBody: >-
  You'll be receiving content all on how to move well whether you're in a gym,
  at home or on the go.


  Find out how to balance fitness within your life, and not jump from one random
  workout program to another.


  In the newsletter, you'll also be receiving information on nutrition topics
  covering blending aesthetics & performance.


  Be sure to subscribe for more updates.
newsletterButtonText: Subscribe to Newsletter
