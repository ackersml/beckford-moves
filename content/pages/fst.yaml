pageHeading: Fascial Stretch Therapy
pageIntro: Improve mobility, posture, and recovery with assisted stretching.
howItWorksHeading: How FST Works
howItWorksBody: >-
  Manual-therapy framework focused on joint capsules and fascial lines to
  restore range of motion.
benefitsHeading: Benefits
benefits:
  - Greater mobility and posture
  - Faster recovery between sessions
  - Enhanced athletic performance
sessionHeading: What a Session Looks Like
sessionBody: >-
  Assessment, table-based assisted stretches, safety and communication,
  expected sensations, and take-home drills.
