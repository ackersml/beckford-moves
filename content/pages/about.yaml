pageHeading: Get to Know Your Coach
storyHeading: My Story
nameHeading: Hi! I'm Sean
storyBody: >-
  I've been a Fitness Trainer for 11 years and I've been fortunate to learn from
  the best at some of the top fitness gyms in North America throughout my career.
  My journey in fitness began with a passion for helping people transform not
  just their bodies, but their entire approach to health and wellness.


  I put everything I have into ensuring my clients improve their bodies and
  lives. My commitment to continuing education throughout my fitness journey has
  helped me deliver a great service to my clients through functional movement,
  nutrition and recovery methods. I believe that true transformation happens when
  we address the whole person—mind, body, and spirit. That's why my approach
  goes beyond traditional personal training to include life coaching, nutrition
  guidance, and holistic wellness practices.


  What sets my practice apart is the personalized attention I give to each
  client. Every program is tailored specifically to your goals, circumstances,
  and preferences. Whether you're training for a specific event, recovering from
  an injury, or simply looking to improve your overall quality of life, I work
  with you to create a sustainable path forward.


  My training philosophy centers on functional movement, proper form, and
  evidence-based methods. I combine strength training, mobility work, and
  recovery techniques to help you move better, feel stronger, and live more
  fully. Through my iOS and Android app, powered by Trainerize, you'll have
  access to your programming, video demonstrations, and direct communication
  with me 24/7.


  I'm looking forward to supporting you in your fitness journey. Whether you're
  just starting out or you're an experienced athlete looking to break through
  plateaus, I'm here to guide you every step of the way. Together, we'll build
  strength, improve mobility, and create lasting habits for long-term health and
  wellness.
certificationsHeading: "My current certifications include:"
certifications:
  - (NSCA) Certified Strength and Conditioning Specialist – National Strength
    and Conditioning Association
  - Registered Massage Therapist (In Training)
  - Fascial Stretch Therapist (Level 2)
  - Registered Yoga Teacher (Yoga Alliance Certified)
  - Precision Nutrition Level 1 & 2 Coach
  - Certified Pre and Post Natal Coach (CPPC) – Girls' Gone Strong
  - TRX Coach
  - FMT Rocktape Level 1 (Kinesology Taping – KT)
  - Agatsu Speed & Strength Specialist
closingText: >-
  These certifications reflect my dedication to staying current with the latest
  research and techniques in fitness, nutrition, and recovery. I'm committed to
  providing you with the highest quality coaching and support as you work toward
  your goals.
